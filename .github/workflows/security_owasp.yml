name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "29 3 * * MON-FRI" # Every weekday at 03:29 UTC
jobs:
  security-kotlin-owasp-check:
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@b74c1336dede62686c46e93458e2ef197ca579ca # v2.13.0
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
