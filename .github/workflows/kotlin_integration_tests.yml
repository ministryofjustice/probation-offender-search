name: Integration tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  integration_tests:
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:3.1.0
        env:
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: Random!Password1
          node.name: opensearch
          cluster.name: probation-search-cluster
          discovery.type: single-node
          bootstrap.memory_lock: true
          plugins.security.disabled: true
          OPENSEARCH_JAVA_OPTS: -Xms8g -Xmx8g
          plugins.ml_commons.only_run_on_ml_node: false
          plugins.ml_commons.model_access_control_enabled: false
          plugins.ml_commons.native_memory_threshold: 99
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 30s
          --health-retries 20
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: refresh cache
        id: initial-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          cache-name: kotlin-cache
        with:
          path: |
            - gradle-{{ checksum "build.gradle.kts" }}
            - gradle-
          key: ${{ runner.os }}-gradle-${{ env.cache-name }}-${{ hashFiles('build.gradle.kts') }}
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
          cache-dependency-path: |
            *.gradle*
            **/gradle-wrapper.properties
      - run: ./gradlew check
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process"
          TESTCONTAINERS_ELASTICSEARCH_ENABLED: 'false'
      - name: upload the artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upload kotlin valdation results
          path: |
            build/test-results
            build/reports/tests